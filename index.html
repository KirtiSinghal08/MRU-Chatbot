<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MRU AI Assistant</title>

<link rel="stylesheet" href="style.css">
</head>

<body>
<div class="bg-animation"></div>

<div id="chat-window">

  <div id="chat-header">
    <div>
      <strong>MRU AI Assistant</strong><br>
      <span>Manav Rachna University · Faridabad</span>
    </div>
    <div class="ai-badge">🔴 LIVE</div>
  </div>

  <div id="messages"></div>

  <div id="input-area">
    <textarea id="user-input" placeholder="Ask anything about MRU..."></textarea>
    <button id="mic-btn">🎤</button>
    <button id="send-btn">Send</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
